<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EduPlanner Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
      :root {
        --primary: oklch(67% 0.18 220);
        --primary-dark: oklch(55% 0.17 220);
        --surface: oklch(12% 0.02 240);
        --surface-raised: oklch(15% 0.025 240);
      }
      body {
        font-family: 'Inter', sans-serif;
        background-color: #020617;
        color: #f8fafc;
        margin: 0;
        overflow-x: hidden;
      }
      .font-serif {
        font-family: 'Libre Baskerville', serif;
      }
      .gradient-primary {
        background: linear-gradient(135deg, var(--primary) 0%, oklch(72% 0.15 195) 100%);
      }
      .custom-scrollbar::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #1e293b;
        border-radius: 10px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: #334155;
      }
      
      @keyframes pulse-soft {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.7; }
      }
      .animate-pulse-soft {
        animation: pulse-soft 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }

      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
      }
      .animate-float {
        animation: float 6s ease-in-out infinite;
      }

      /* Grid Pattern Background */
      .bg-grid {
        background-size: 40px 40px;
        background-image: 
          linear-gradient(to right, rgba(255, 255, 255, 0.02) 1px, transparent 1px),
          linear-gradient(to bottom, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
      }

      @keyframes border-breathe {
        0%, 100% { border-color: rgba(14,165,233,0.15); }
        50% { border-color: rgba(14,165,233,0.35); }
      }
      .hero-card-border {
        animation: border-breathe 4s ease-in-out infinite;
      }

      @keyframes cell-drop {
        0% { transform: scale(0.75); opacity: 0; }
        60% { transform: scale(1.05); }
        100% { transform: scale(1); opacity: 1; }
      }
      .cell-drop {
        animation: cell-drop 0.25s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      @keyframes conflict-pulse {
        0%,100% { box-shadow: 0 0 0 0 rgba(244,63,94,0); }
        50% { box-shadow: 0 0 0 3px rgba(244,63,94,0.4); }
      }
      .conflict-cell {
        animation: conflict-pulse 0.6s ease-in-out 2;
      }

      @keyframes pill-appear {
        from { opacity: 0; transform: scaleX(0); transform-origin: left; }
        to { opacity: 1; transform: scaleX(1); }
      }
      .timetable-pill {
        animation: pill-appear 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
      }

      @media print {
        nav, .no-print, button { display: none !important; }
        body { background: white !important; color: black !important; }
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.0.0",
    "react-dom": "https://esm.sh/react-dom@^19.0.0",
    "react-dom/": "https://esm.sh/react-dom@^19.0.0/",
    "react/": "https://esm.sh/react@^19.0.0/",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
    "recharts": "https://esm.sh/recharts@^2.15.0",
    "firebase/app": "https://esm.sh/firebase@11.0.1/app",
    "firebase/auth": "https://esm.sh/firebase@11.0.1/auth?external=firebase/app",
    "firebase/firestore": "https://esm.sh/firebase@11.0.1/firestore?external=firebase/app",
    "lucide-react": "https://esm.sh/lucide-react@^0.454.0",
    "motion": "https://esm.sh/motion@11.11.13",
    "motion/react": "https://esm.sh/motion@11.11.13/react",
    "firebase/": "https://esm.sh/firebase@^12.8.0/",
    "vite": "https://esm.sh/vite@^7.3.1",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2"
  }
}
</script>
</head>
  <body class="bg-[#020617] text-white">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
