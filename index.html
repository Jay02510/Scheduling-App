        background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);

      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #e2e8f0;
        border-radius: 10px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {

      }
