
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EduPlanner Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
      :root {
        --primary: #6366f1;
        --primary-dark: #4f46e5;
      }
      body {
        font-family: 'Inter', sans-serif;
        background-color: #f8fafc;
        color: #0f172a;
      }
      .gradient-primary {
        background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
      }
      .custom-scrollbar::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #e2e8f0;
        border-radius: 10px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: #cbd5e1;
      }
      .bg-vivid-blocked {
        background-color: #f1f5f9;
        background-image: repeating-linear-gradient(
          45deg,
          transparent,
          transparent 10px,
          rgba(148, 163, 184, 0.05) 10px,
          rgba(148, 163, 184, 0.05) 20px
        );
        border: 1px inset rgba(0,0,0,0.05);
      }
      @keyframes pulse-soft {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.7; }
      }
      .animate-pulse-soft {
        animation: pulse-soft 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }
      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-fadeInUp {
        animation: fadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      .animate-fadeIn {
        animation: fadeIn 0.4s ease-out forwards;
      }

      /* PDF/Print Optimization */
      @media print {
        nav, 
        .no-print, 
        button, 
        .bg-slate-100, 
        header .flex,
        .xl\:col-span-1,
        .mb-8.no-print {
          display: none !important;
        }
        main {
          padding: 0 !important;
          margin: 0 !important;
          width: 100% !important;
          max-width: none !important;
          height: auto !important;
          overflow: visible !important;
          position: static !important;
          display: block !important;
        }
        .max-w-6xl {
          max-width: 100% !important;
          width: 100% !important;
          margin: 0 !important;
        }
        .xl\:col-span-3 {
          width: 100% !important;
          grid-column: span 4 / span 4 !important;
        }
        body {
          background-color: white !important;
          overflow: visible !important;
          height: auto !important;
        }
        .bg-white {
          background-color: white !important;
        }
        .border-slate-900 {
          border-color: #000 !important;
        }
        * {
          -webkit-print-color-adjust: exact !important;
          print-color-adjust: exact !important;
          box-shadow: none !important;
        }
        @page {
          margin: 0.5cm;
          size: landscape;
        }
        table {
          page-break-inside: avoid;
          width: 100% !important;
          table-layout: fixed !important;
        }
        tr, td, th {
          page-break-inside: avoid;
        }
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",

    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
    "recharts": "https://esm.sh/recharts@^2.15.0",
    "firebase/": "https://esm.sh/firebase@^11.0.1/",
    "firebase/app": "https://esm.sh/firebase@^11.0.1/app",
    "firebase/auth": "https://esm.sh/firebase@^11.0.1/auth",
    "firebase/firestore": "https://esm.sh/firebase@^11.0.1/firestore",
    "lucide-react": "https://esm.sh/lucide-react@^0.454.0",
    "vite": "https://esm.sh/vite@^7.3.1",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>

  </body>
</html>
