<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EduPlanner Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
      :root {
        --primary: #0ea5e9;
        --primary-dark: #0284c7;
      }
      body {
        font-family: 'Inter', sans-serif;
        background-color: #020617;
        color: #f8fafc;
        margin: 0;
        overflow-x: hidden;
      }
      .font-serif {
        font-family: 'Libre Baskerville', serif;
      }
      .gradient-primary {
        background: linear-gradient(135deg, #0ea5e9 0%, #2dd4bf 100%);
      }
      .custom-scrollbar::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #1e293b;
        border-radius: 10px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: #334155;
      }
      
      /* Benchmark Glow Effects */
      .text-glow-cyan {
        text-shadow: 0 0 20px rgba(14, 165, 233, 0.5), 0 0 40px rgba(14, 165, 233, 0.3);
      }
      .border-glow-cyan {
        box-shadow: 0 0 15px rgba(14, 165, 233, 0.2);
        border: 1px solid rgba(14, 165, 233, 0.3);
      }
      .border-glow-cyan:hover {
        box-shadow: 0 0 25px rgba(14, 165, 233, 0.4);
        border: 1px solid rgba(14, 165, 233, 0.6);
      }

      @keyframes pulse-soft {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.7; }
      }
      .animate-pulse-soft {
        animation: pulse-soft 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }

      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
      }
      .animate-float {
        animation: float 6s ease-in-out infinite;
      }

      /* Grid Pattern Background */
      .bg-grid {
        background-size: 40px 40px;
        background-image: 
          linear-gradient(to right, rgba(255, 255, 255, 0.02) 1px, transparent 1px),
          linear-gradient(to bottom, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
      }

      @media print {
        nav, .no-print, button { display: none !important; }
        body { background: white !important; color: black !important; }
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.0.0",

    "firebase/auth": "https://esm.sh/firebase@11.0.1/auth?external=firebase/app",
    "firebase/firestore": "https://esm.sh/firebase@11.0.1/firestore?external=firebase/app",
    "lucide-react": "https://esm.sh/lucide-react@^0.454.0",
    "motion": "https://esm.sh/motion@11.11.13",
    "motion/react": "https://esm.sh/motion@11.11.13/react",
    "firebase/": "https://esm.sh/firebase@^12.8.0/",
    "vite": "https://esm.sh/vite@^7.3.1",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2"
  }
}
</script>
</head>
